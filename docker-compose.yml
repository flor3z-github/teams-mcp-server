services:
  teams-mcp:
    build: .
    ports:
      - "${TEAMS_PORT:-3978}:${TEAMS_PORT:-3978}"
    environment:
      - MCP_TRANSPORT=http
      - TEAMS_PORT=${TEAMS_PORT:-3978}
      - LOG_LEVEL=info
    volumes:
      - teams-state:/root/.claude/channels/teams
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3978/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  teams-state:
