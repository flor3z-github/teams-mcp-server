services:
  teams-mcp:
    build: .
    ports:
      - "${TEAMS_PORT:-3978}:${TEAMS_PORT:-3978}"
    env_file:
      - .env
    environment:
      - TEAMS_PORT=${TEAMS_PORT:-3978}
      - TEAMS_STATE_DIR=/data
    volumes:
      - teams-state:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${TEAMS_PORT:-3978}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  teams-state:
